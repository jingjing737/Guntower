<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="355.64422" height="266.33333" viewBox="0,0,355.64422,266.33333"><g transform="translate(-62.17789,-46.83334)"><g data-paper-data="{&quot;isPaintingLayer&quot;:true}" fill-rule="nonzero" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" style="mix-blend-mode: normal"><path d="M62.17789,313.16667v-266.33333h355.64422v266.33333z" fill="#4d4d4d" stroke="#333333" stroke-width="0"/><text transform="translate(73.83341,72.50494) scale(0.37501,0.37501)" font-size="40" xml:space="preserve" fill="#818181" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="Sans Serif" font-weight="normal" text-anchor="start" style="mix-blend-mode: normal"><tspan x="0" dy="0">...</tspan><tspan x="0" dy="48px">你好。虽然不知道你是谁，但是没时间了解了。</tspan><tspan x="0" dy="48px">雷达显示，它们的军队将在一天后到达。</tspan><tspan x="0" dy="48px">这里是存放能量石的基地前的最后一块空地，而我</tspan><tspan x="0" dy="48px">们还需要五十天才能将能量石运走。</tspan><tspan x="0" dy="48px">好在我们已经充分掌握了它们的兵种信息，这在以</tspan><tspan x="0" dy="48px">后详细说明。它们没有任何攻击性武器，所以我们</tspan><tspan x="0" dy="48px">可以利用炮塔阻止它们，但任何一个敌人的通过都</tspan><tspan x="0" dy="48px">将导致巨大的灾难。</tspan><tspan x="0" dy="48px">拿来做炮塔的材料并不多，但我们可以利用敌人的</tspan><tspan x="0" dy="48px">残骸制作材料。</tspan><tspan x="0" dy="48px">...我想有必要说明一下这个控制面板该怎么操作。</tspan></text></g></g></svg>